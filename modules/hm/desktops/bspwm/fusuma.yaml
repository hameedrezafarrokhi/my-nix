pinch:
  2:
    in:
      begin:
     #command: 'xdotool keydown ctrl click 4 keyup ctrl & xdotool key ctrl+shift+equal'
       #command: 'xdotool key ctrl+equal & xdotool key ctrl+shift+equal'
        sendkey: ["LEFTCTRL+EQUAL", "LEFTCTRL+LEFTSHIFT+EQUAL"]
     #command: 'xdotool keydown ctrl key plus keyup ctrl'
     #sendkey: "LEFTCTRL+EQUAL"
        threshold: 0.5
      update:
       #command: 'xdotool key ctrl+equal & xdotool key ctrl+shift+equal'
        sendkey: ["LEFTCTRL+EQUAL", "LEFTCTRL+LEFTSHIFT+EQUAL"]
        interval: 5
        threshold: 1
    out:
      begin:
      #command: 'xdotool keydown ctrl click 5 keyup ctrl & xdotool key ctrl+shift+minus'
       #command: 'xdotool key ctrl+minus & xdotool key ctrl+shift+minus'
        sendkey: ["LEFTCTRL+MINUS", "LEFTCTRL+LEFTSHIFT+MINUS"]
     #command: 'xdotool keydown ctrl key minus keyup ctrl'
     #sendkey: "LEFTCTRL+MINUS"
        threshold: 0.5
      update:
       #command: 'xdotool key ctrl+minus & xdotool key ctrl+shift+minus'
        sendkey: ["LEFTCTRL+MINUS", "LEFTCTRL+LEFTSHIFT+MINUS"]
        interval: 5
        threshold: 1

threshold:
  swipe: 2
  pinch: 2

interval:
  swipe: 2
  pinch: 2

