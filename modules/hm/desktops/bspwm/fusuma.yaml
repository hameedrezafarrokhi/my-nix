swipe:
  3:
   #right:
   #  begin:
   #    command: 'wmctrl -s $(( $(xdotool get_desktop) + 1 ))'
   #    threshold: 2
   #  update:
   #    command: 'wmctrl -s $(( $(xdotool get_desktop) + 1 ))'
   #    interval: 2
   #    threshold: 3
   #left:
   #  begin:
   #    command: 'wmctrl -s $(( $(xdotool get_desktop) - 1 ))'
   #    threshold: 2
   #  update:
   #    command: 'wmctrl -s $(( $(xdotool get_desktop) - 1 ))'
   #    interval: 2
   #    threshold: 3
    right:
     #workspace: 'next'
     #threshold: 0.7
      begin:
        workspace: 'next'
        threshold: 2
        keypress:
          LEFTMETA:
            window: 'next'
            threshold: 0.7
          LEFTALT:
            command: 'sh -c bsp-send-follow-empty'
            threshold: 0.7
          LEFTCTRL:
            command: 'sh -c bsp-send-next-empty'
            threshold: 0.7
      update:
        workspace: 'next'
        interval: 5
        threshold: 4
     #keypress:
     #  LEFTMETA:
     #    window: 'next'
     #    threshold: 0.7
     #  LEFTALT:
     #    command: 'sh -c bsp-send-follow-empty'
     #    threshold: 0.7
     #  LEFTCTRL:
     #    command: 'sh -c bsp-send-next-empty'
     #    threshold: 0.7
    left:
     #workspace: 'prev'
     #threshold: 0.7
      begin:
        workspace: 'prev'
        threshold: 2
        keypress:
          LEFTMETA:
            window: 'prev'
            threshold: 0.7
          LEFTALT:
            command: 'sh -c bsp-send-prev-follow-empty'
            threshold: 0.7
          LEFTCTRL:
            command: 'sh -c bsp-send-prev-empty'
            threshold: 0.7
      update:
        workspace: 'prev'
        interval: 5
        threshold: 4
     #keypress:
     #  LEFTMETA:
     #    window: 'prev'
     #    threshold: 0.7
     #  LEFTALT:
     #    command: 'sh -c bsp-send-prev-follow-empty'
     #    threshold: 0.7
     #  LEFTCTRL:
     #    command: 'sh -c bsp-send-prev-empty'
     #    threshold: 0.7
    up:
      begin:
        command: 'rofi -show drun -modi drun,drun,run,emoji,ssh,window,windowcd,combi,keys,filebrowser,calc,top,blezz,games,nerdy,file-browser-extended -show-icons -theme .config/rofi/themes/main.rasi'
        threshold: 2
      update:
       #command: 'xdotool key ctrl+Tab'
        sendkey: "LEFTCTRL+TAB"
        threshold: 3
        interval: 5
    down:
      begin:
        command: 'rofi -show drun -modi drun,drun,run,emoji,ssh,window,windowcd,combi,keys,filebrowser,calc,top,blezz,games,nerdy,file-browser-extended -show-icons -theme .config/rofi/themes/main.rasi'
        threshold: 2
      update:
       #command: 'xdotool key ctrl+shift+Tab'
        sendkey: "LEFTCTRL+LEFTSHIFT+TAB"
        threshold: 3
        interval: 5
  4:
    right:
      begin:
       #command: 'xdotool key super+apostrophe'
        sendkey: "LEFTMETA+APOSTROPHE"
        threshold: 0.5
      update:
       #command: 'xdotool key super+alt+apostrophe'
        sendkey: "LEFTMETA+LEFTALT+APOSTROPHE"
        threshold: 10
        interval: 7
    left:
     #command: 'xdotool key super+g'
      sendkey: "LEFTMETA+G"
      threshold: 0.5
    down:
     #command: 'xdotool key super+f'
      sendkey: "LEFTMETA+F"
      threshold: 0.5
      keypress:
        LEFTMETA:
          window: 'close'
    up:
     #command: 'xdotool key super+Return'
     #sendkey: "LEFTMETA+RETURN"
      window:
        fullscreen: toggle
      threshold: 0.5
      keypress:
        LEFTMETA:
          window:
            maximized: toggle

hold:
 #4:
